<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptGod — The Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <div class="logo-text">
          <h1>PromptGod</h1>
          <span class="tagline">AI Prompt Sanitizer</span>
        </div>
      </div>
      <button id="toggle-btn" class="toggle-btn" title="Toggle extension">
        <span class="toggle-dot"></span>
      </button>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Active</span>
      <span class="stats" id="stats-badge"></span>
    </div>
  </header>

  <!-- Vault Section -->
  <section class="vault">
    <div class="vault-header">
      <h2>🗃️ The Vault</h2>
      <button id="clear-btn" class="clear-btn" title="Clear all vault data">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear
      </button>
    </div>
    <div class="vault-list" id="vault-list">
      <!-- Items injected by popup.js -->
    </div>
  </section>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" style="display: none;">
    <div class="empty-icon">🔒</div>
    <p class="empty-title">Vault is empty</p>
    <p class="empty-desc">Paste text containing API keys or secrets into any AI chatbot. PromptGod will mask them and store the originals here.</p>
  </div>

  <footer class="footer">
    <div class="footer-top">
      <a href="#" id="options-link">⚙️ Settings</a>
      <span class="footer-sep">·</span>
      <a href="../legal/terms.html" target="_blank">Terms</a>
      <span class="footer-sep">·</span>
      <a href="../legal/privacy.html" target="_blank">Privacy</a>
    </div>
    <div class="footer-copyright">© 2026 PromptGod. All rights reserved.</div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
